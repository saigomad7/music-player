<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Playlist</title>
<style>
  :root {
    --bg: #faf6f0;
    --surface: #ffffff;
    --surface-hover: #fdf1e8;
    --text: #40372f;
    --text-dim: #a89c8f;
    --accent: #e2795b;
    --accent-deep: #cf6448;
    --accent-soft: #fbe9e1;
    --danger: #d96c5f;
    --border: #f0e6da;
    --shadow: 0 2px 14px rgba(120, 90, 60, 0.08);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Malgun Gothic", sans-serif;
    min-height: 100vh;
    display: flex;
    justify-content: center;
  }

  .app {
    width: 100%;
    max-width: 430px;      /* 모바일 기준 폭 */
    padding: 28px 18px 48px;
  }

  /* 헤더 */
  .header {
    text-align: center;
    margin-bottom: 22px;
  }

  .logo {
    width: 52px;
    height: 52px;
    margin: 0 auto 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1.5rem;
    background: var(--accent-soft);
    border-radius: 50%;
  }

  .header h1 {
    font-size: 1.45rem;
    font-weight: 700;
    letter-spacing: 0.04em;
  }

  .tagline {
    margin-top: 6px;
    font-size: 0.85rem;
    color: var(--text-dim);
  }

  /* 입력 영역 */
  .form {
    display: flex;
    flex-direction: column;
    gap: 10px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 18px;
    padding: 16px;
    box-shadow: var(--shadow);
  }

  .form input {
    width: 100%;
    padding: 13px 14px;
    font-size: 1rem;
    background: var(--bg);
    color: var(--text);
    border: 1px solid var(--border);
    border-radius: 12px;
    outline: none;
    transition: border-color 0.15s;
  }

  .form input:focus { border-color: var(--accent); }
  .form input::placeholder { color: var(--text-dim); }

  .form button {
    padding: 14px;
    font-size: 1rem;
    font-weight: 600;
    color: #fff;
    background: var(--accent);
    border: none;
    border-radius: 12px;
    cursor: pointer;
    transition: background 0.15s;
    -webkit-tap-highlight-color: transparent;
  }

  .form button:hover { background: var(--accent-deep); }

  .divider {
    display: flex;
    align-items: center;
    gap: 10px;
    color: var(--text-dim);
    font-size: 0.8rem;
  }

  .divider::before, .divider::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  .form .file-btn {
    color: var(--accent-deep);
    background: var(--accent-soft);
    font-size: 0.95rem;
  }

  .form .file-btn:hover { background: #f7ddd1; }

  /* 플레이어 */
  .player { margin: 18px 0; }
  .player audio { width: 100%; }

  .player video {
    width: 100%;
    max-height: 260px;
    border-radius: 14px;
    background: #000;
    box-shadow: var(--shadow);
    margin-bottom: 10px;
  }

  .yt-wrap {
    aspect-ratio: 16 / 9;
    border-radius: 14px;
    overflow: hidden;
    background: #000;
    margin-bottom: 10px;
    box-shadow: var(--shadow);
  }
  .yt-wrap iframe { width: 100%; height: 100%; border: 0; }

  .now-playing {
    font-size: 0.85rem;
    color: var(--accent);
    margin-bottom: 8px;
    min-height: 1.2em;
    text-align: center;
  }

  /* 폴더 바 */
  .folders {
    display: flex;
    gap: 8px;
    overflow-x: auto;
    margin: 4px 0 14px;
    padding-bottom: 4px;
    -webkit-overflow-scrolling: touch;
  }

  .folder-chip {
    flex-shrink: 0;
    display: flex;
    align-items: center;
    gap: 7px;
    padding: 9px 15px;
    font-size: 0.9rem;
    font-family: inherit;
    color: var(--text-dim);
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 999px;
    cursor: pointer;
    transition: background 0.15s, color 0.15s, border-color 0.15s;
    -webkit-tap-highlight-color: transparent;
  }

  .folder-chip:hover { border-color: var(--accent); }

  .folder-chip.active {
    background: var(--accent);
    border-color: var(--accent);
    color: #fff;
    font-weight: 600;
  }

  .folder-chip .count {
    font-size: 0.75rem;
    opacity: 0.75;
  }

  .folder-chip .folder-del {
    font-size: 0.8rem;
    padding-left: 2px;
    opacity: 0.85;
  }

  .folder-add {
    border-style: dashed;
    color: var(--text-dim);
  }

  /* 노래 목록 */
  #song-list {
    list-style: none;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  #song-list li {
    display: flex;
    align-items: center;
    gap: 4px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 4px 8px 4px 10px;
    box-shadow: var(--shadow);
    transition: background 0.15s, border-color 0.15s, transform 0.15s;
  }

  #song-list li:hover {
    background: var(--surface-hover);
    border-color: var(--accent);
    transform: translateY(-1px);
  }

  #song-list li.playing {
    border-color: var(--accent);
    background: var(--accent-soft);
  }

  #song-list li.playing .title { color: var(--accent-deep); }

  .icon {
    flex-shrink: 0;
    width: 34px;
    height: 34px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 0.9rem;
    color: var(--accent-deep);
    background: var(--accent-soft);
    border-radius: 10px;
  }

  .title {
    flex: 1;
    padding: 15px 8px;
    font-size: 1rem;
    cursor: pointer;
    user-select: none;
    -webkit-tap-highlight-color: transparent;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  .delete {
    flex-shrink: 0;
    width: 40px;
    height: 40px;
    font-size: 0.95rem;
    color: var(--text-dim);
    background: none;
    border: none;
    border-radius: 10px;
    cursor: pointer;
    transition: color 0.15s, background 0.15s;
    -webkit-tap-highlight-color: transparent;
  }

  .delete:hover {
    color: var(--danger);
    background: rgba(217, 108, 95, 0.12);
  }

  .move {
    flex-shrink: 0;
    width: 40px;
    height: 40px;
    font-size: 0.95rem;
    background: none;
    border: none;
    border-radius: 10px;
    cursor: pointer;
    transition: background 0.15s;
    -webkit-tap-highlight-color: transparent;
  }

  .move:hover { background: var(--accent-soft); }

  /* 폴더 선택 시트 */
  .sheet-backdrop {
    position: fixed;
    inset: 0;
    background: rgba(64, 55, 47, 0.45);
    display: flex;
    align-items: flex-end;
    justify-content: center;
    z-index: 10;
  }

  .sheet {
    width: 100%;
    max-width: 430px;
    background: var(--surface);
    border-radius: 20px 20px 0 0;
    padding: 20px 18px 30px;
  }

  .sheet h2 {
    font-size: 1.05rem;
    margin-bottom: 4px;
  }

  .sheet-sub {
    font-size: 0.85rem;
    color: var(--text-dim);
    margin-bottom: 16px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  .sheet-option {
    display: block;
    width: 100%;
    text-align: left;
    padding: 14px;
    margin-bottom: 8px;
    font-size: 1rem;
    font-family: inherit;
    color: var(--text);
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 12px;
    cursor: pointer;
    transition: border-color 0.15s, background 0.15s;
    -webkit-tap-highlight-color: transparent;
  }

  .sheet-option:hover {
    border-color: var(--accent);
    background: var(--surface-hover);
  }

  .sheet-cancel {
    display: block;
    width: 100%;
    padding: 14px;
    margin-top: 6px;
    font-size: 1rem;
    font-family: inherit;
    font-weight: 600;
    color: var(--text-dim);
    background: none;
    border: none;
    border-radius: 12px;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
  }

  .empty {
    text-align: center;
    color: var(--text-dim);
    font-size: 0.9rem;
    padding: 28px 0;
  }
</style>
</head>
<body>
<div class="app">
  <header class="header">
    <div class="logo">🎧</div>
    <h1>My Playlist</h1>
    <p class="tagline">듣고 싶은 노래를 나만의 폴더로</p>
  </header>

  <div class="form">
    <input id="song-title" type="text" placeholder="노래 제목" autocomplete="off">
    <input id="song-url" type="url" placeholder="노래 URL (mp3 또는 유튜브 링크)" autocomplete="off">
    <button id="add-btn">목록에 담기</button>
    <div class="divider">또는</div>
    <button id="file-btn" class="file-btn" type="button">📁 내 파일에서 고르기</button>
    <input id="file-input" type="file" accept="audio/*,video/mp4,video/webm,video/quicktime,.mp3,.m4a,.aac,.wav,.ogg,.mp4,.mov,.webm" hidden>
  </div>

  <div class="player">
    <div class="now-playing" id="now-playing"></div>
    <div class="yt-wrap" id="yt-wrap" hidden><div id="yt-player"></div></div>
    <video id="video" controls playsinline hidden></video>
    <audio id="audio" controls></audio>
  </div>

  <div class="folders" id="folder-bar"></div>

  <ul id="song-list"></ul>
  <div class="empty" id="empty-msg">이 폴더에 담긴 노래가 없어요</div>
</div>

<script>
  const titleInput = document.getElementById('song-title');
  const urlInput = document.getElementById('song-url');
  const addBtn = document.getElementById('add-btn');
  const songList = document.getElementById('song-list');
  const audio = document.getElementById('audio');
  const nowPlaying = document.getElementById('now-playing');
  const emptyMsg = document.getElementById('empty-msg');
  const ytWrap = document.getElementById('yt-wrap');
  const video = document.getElementById('video');
  const folderBar = document.getElementById('folder-bar');
  const fileBtn = document.getElementById('file-btn');
  const fileInput = document.getElementById('file-input');

  const STORAGE_KEY = 'music-player-data';
  const LEGACY_KEY = 'music-player-songs';

  let current = null;   // { url, title } 현재 재생 곡
  let currentLi = null; // 현재 재생 곡의 li (다른 폴더를 보는 중이면 null)

  /* ---------- 데이터 (폴더 구조) ---------- */

  function loadData() {
    try {
      const saved = JSON.parse(localStorage.getItem(STORAGE_KEY));
      if (saved && Array.isArray(saved.folders) && saved.folders.length) return saved;
    } catch {}
    // 이전 버전(단일 목록) 데이터를 기본 폴더로 이전
    let legacy = [];
    try { legacy = JSON.parse(localStorage.getItem(LEGACY_KEY)) || []; } catch {}
    return { folders: [{ id: 'default', name: '내 노래', songs: legacy }], activeId: 'default' };
  }

  let data = loadData();

  function saveData() {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
  }

  function activeFolder() {
    return data.folders.find(f => f.id === data.activeId) || data.folders[0];
  }

  // 곡 식별 키: 내 파일 곡은 fileId, URL 곡은 url
  function songKey(song) {
    return song.fileId || song.url;
  }

  /* ---------- 내 파일 저장 (IndexedDB) ---------- */

  let dbPromise = null;
  function getDb() {
    if (!dbPromise) {
      dbPromise = new Promise((resolve, reject) => {
        const req = indexedDB.open('music-player-files', 1);
        req.onupgradeneeded = () => req.result.createObjectStore('files');
        req.onsuccess = () => resolve(req.result);
        req.onerror = () => reject(req.error);
      });
    }
    return dbPromise;
  }

  function idbPut(key, blob) {
    return getDb().then(db => new Promise((resolve, reject) => {
      const tx = db.transaction('files', 'readwrite');
      tx.objectStore('files').put(blob, key);
      tx.oncomplete = resolve;
      tx.onerror = () => reject(tx.error);
    }));
  }

  function idbGet(key) {
    return getDb().then(db => new Promise((resolve, reject) => {
      const req = db.transaction('files').objectStore('files').get(key);
      req.onsuccess = () => resolve(req.result);
      req.onerror = () => reject(req.error);
    }));
  }

  function idbDelete(key) {
    return getDb().then(db => new Promise((resolve, reject) => {
      const tx = db.transaction('files', 'readwrite');
      tx.objectStore('files').delete(key);
      tx.oncomplete = resolve;
      tx.onerror = () => reject(tx.error);
    }));
  }

  let objectUrl = null; // 현재 재생 중인 파일 곡의 임시 URL
  async function playLocalFile(song) {
    let blob = null;
    try { blob = await idbGet(song.fileId); } catch {}
    if (!blob) {
      nowPlaying.textContent = '저장된 파일을 찾지 못했어요.';
      return;
    }
    if (objectUrl) URL.revokeObjectURL(objectUrl);
    objectUrl = URL.createObjectURL(blob);

    if (song.isVideo) {
      audio.pause();
      audio.removeAttribute('src');
      audio.load();
      video.hidden = false;
      video.src = objectUrl;
      video.play().catch(() => {});
    } else {
      stopVideo();
      audio.src = objectUrl;
      audio.play().catch(() => {});
    }
  }

  function stopVideo() {
    video.pause();
    video.removeAttribute('src');
    video.load();
    video.hidden = true;
  }

  /* ---------- 유튜브 ---------- */

  function getYouTubeId(url) {
    if (!url) return null;
    const m = url.match(/(?:youtube\.com\/(?:watch\?(?:.*&)?v=|shorts\/|embed\/|live\/)|youtu\.be\/)([\w-]{11})/);
    return m ? m[1] : null;
  }

  let ytPlayer = null;
  let ytReady = false;
  let pendingYtId = null; // API 로딩 중 클릭된 영상

  window.onYouTubeIframeAPIReady = function () {
    ytPlayer = new YT.Player('yt-player', {
      playerVars: { playsinline: 1 },
      events: {
        onReady: () => {
          ytReady = true;
          if (pendingYtId) {
            ytPlayer.loadVideoById(pendingYtId);
            pendingYtId = null;
          }
        },
        onStateChange: (e) => {
          if (!current || !current.isYt || !currentLi) return;
          if (e.data === YT.PlayerState.PLAYING) {
            currentLi.classList.add('playing');
          } else if (e.data === YT.PlayerState.PAUSED || e.data === YT.PlayerState.ENDED) {
            currentLi.classList.remove('playing');
          }
        },
        onError: () => {
          nowPlaying.textContent = '이 영상은 외부 사이트 재생이 허용되지 않아요.';
          if (currentLi) currentLi.classList.remove('playing');
        }
      }
    });
  };

  // API를 미리 로드해 두면 첫 클릭 시 바로 재생 가능
  (function loadYtApi() {
    const s = document.createElement('script');
    s.src = 'https://www.youtube.com/iframe_api';
    document.head.appendChild(s);
  })();

  function playYouTube(id) {
    ytWrap.hidden = false;
    // 파일/mp3 재생 중이면 중지
    stopVideo();
    audio.pause();
    audio.removeAttribute('src');
    audio.load();
    if (ytReady) {
      ytPlayer.loadVideoById(id);
    } else {
      pendingYtId = id;
    }
  }

  function stopYouTube() {
    if (ytPlayer && ytReady) ytPlayer.stopVideo();
    pendingYtId = null;
    ytWrap.hidden = true;
  }

  function isPlayingNow() {
    if (!current) return false;
    if (current.isYt) {
      return ytReady && ytPlayer.getPlayerState() === YT.PlayerState.PLAYING;
    }
    if (current.isVideo) return !video.paused;
    return !audio.paused;
  }

  /* ---------- 화면 그리기 ---------- */

  function render() {
    renderFolders();
    renderSongs();
  }

  function renderFolders() {
    folderBar.innerHTML = '';

    data.folders.forEach((folder, idx) => {
      const chip = document.createElement('button');
      chip.className = 'folder-chip' + (folder.id === data.activeId ? ' active' : '');

      const name = document.createElement('span');
      name.textContent = '📁 ' + folder.name;
      const count = document.createElement('span');
      count.className = 'count';
      count.textContent = folder.songs.length;
      chip.appendChild(name);
      chip.appendChild(count);

      // 기본 폴더가 아닌 선택된 폴더에만 삭제 버튼 표시
      if (idx > 0 && folder.id === data.activeId) {
        const del = document.createElement('span');
        del.className = 'folder-del';
        del.textContent = '✕';
        del.addEventListener('click', (e) => {
          e.stopPropagation();
          deleteFolder(folder);
        });
        chip.appendChild(del);
      }

      chip.addEventListener('click', () => {
        data.activeId = folder.id;
        saveData();
        render();
      });

      folderBar.appendChild(chip);
    });

    const add = document.createElement('button');
    add.className = 'folder-chip folder-add';
    add.textContent = '+ 새 폴더';
    add.addEventListener('click', createFolder);
    folderBar.appendChild(add);
  }

  function createFolder() {
    const name = prompt('새 폴더 이름을 입력해 주세요.');
    if (!name || !name.trim()) return;
    const folder = { id: String(Date.now()), name: name.trim(), songs: [] };
    data.folders.push(folder);
    data.activeId = folder.id;
    saveData();
    render();
  }

  function deleteFolder(folder) {
    const base = data.folders[0];
    const msg = folder.songs.length
      ? `'${folder.name}' 폴더를 삭제할까요?\n담긴 노래 ${folder.songs.length}곡은 '${base.name}' 폴더로 이동돼요.`
      : `'${folder.name}' 폴더를 삭제할까요?`;
    if (!confirm(msg)) return;
    base.songs.push(...folder.songs);
    data.folders = data.folders.filter(f => f.id !== folder.id);
    data.activeId = base.id;
    saveData();
    render();
  }

  function renderSongs() {
    songList.innerHTML = '';
    currentLi = null;

    activeFolder().songs.forEach(song => {
      const li = createSongItem(song);
      if (current && current.key === songKey(song)) {
        currentLi = li;
        if (isPlayingNow()) li.classList.add('playing');
      }
    });

    updateEmptyMsg();
  }

  function createSongItem(song) {
    const li = document.createElement('li');

    const icon = document.createElement('span');
    icon.className = 'icon';
    icon.textContent = getYouTubeId(song.url) ? '▶' : (song.isVideo ? '🎬' : (song.fileId ? '♬' : '♪'));

    const titleSpan = document.createElement('span');
    titleSpan.className = 'title';
    titleSpan.textContent = song.title;
    titleSpan.addEventListener('click', () => togglePlay(song, li));

    const moveBtn = document.createElement('button');
    moveBtn.className = 'move';
    moveBtn.textContent = '📂';
    moveBtn.setAttribute('aria-label', song.title + ' 다른 폴더로 이동');
    moveBtn.addEventListener('click', () => moveSong(song));

    const delBtn = document.createElement('button');
    delBtn.className = 'delete';
    delBtn.textContent = '✕';
    delBtn.setAttribute('aria-label', song.title + ' 삭제');
    delBtn.addEventListener('click', () => removeSong(song));

    li.appendChild(icon);
    li.appendChild(titleSpan);
    li.appendChild(moveBtn);
    li.appendChild(delBtn);
    songList.appendChild(li);
    return li;
  }

  function updateEmptyMsg() {
    emptyMsg.style.display = songList.children.length ? 'none' : 'block';
  }

  /* ---------- 노래 추가/재생/삭제 ---------- */

  function addSong() {
    const title = titleInput.value.trim();
    const url = urlInput.value.trim();
    if (!title || !url) {
      alert('노래 제목과 URL을 모두 입력해 주세요.');
      return;
    }

    activeFolder().songs.push({ title, url });
    saveData();
    render();

    titleInput.value = '';
    urlInput.value = '';
    titleInput.focus();
  }

  function togglePlay(song, li) {
    const ytId = getYouTubeId(song.url);
    const key = songKey(song);

    if (current && current.key === key) {
      // 같은 곡 클릭 → 재생/일시정지 토글
      currentLi = li;
      if (ytId) {
        if (!ytReady) return;
        if (ytPlayer.getPlayerState() === YT.PlayerState.PLAYING) {
          ytPlayer.pauseVideo();
        } else {
          ytPlayer.playVideo();
        }
      } else {
        const media = current.isVideo ? video : audio;
        if (media.paused) media.play();
        else media.pause();
      }
      return;
    }

    // 다른 곡 클릭 → 새로 재생
    if (currentLi) currentLi.classList.remove('playing');
    current = { key, title: song.title, isYt: !!ytId, isVideo: !!song.isVideo };
    currentLi = li;
    nowPlaying.textContent = '지금 듣는 중 · ' + song.title;

    if (ytId) {
      playYouTube(ytId);
    } else if (song.fileId) {
      stopYouTube();
      playLocalFile(song);
    } else {
      stopYouTube();
      stopVideo();
      audio.src = song.url;
      audio.play();
    }
    li.classList.add('playing');
  }

  function removeSong(song) {
    if (!confirm(`'${song.title}'\n이 노래를 폴더에서 뺄까요?`)) return;

    const folder = activeFolder();
    const idx = folder.songs.indexOf(song);
    if (idx > -1) folder.songs.splice(idx, 1);

    if (current && current.key === songKey(song)) {
      if (current.isYt) {
        stopYouTube();
      } else if (current.isVideo) {
        stopVideo();
      } else {
        audio.pause();
        audio.removeAttribute('src');
        audio.load();
      }
      nowPlaying.textContent = '';
      current = null;
      currentLi = null;
    }

    if (song.fileId) idbDelete(song.fileId).catch(() => {});

    saveData();
    render();
  }

  function moveSong(song) {
    const others = data.folders.filter(f => f.id !== activeFolder().id);
    if (!others.length) {
      alert('옮길 다른 폴더가 없어요.\n먼저 + 새 폴더를 만들어 주세요.');
      return;
    }

    const backdrop = document.createElement('div');
    backdrop.className = 'sheet-backdrop';
    backdrop.addEventListener('click', e => {
      if (e.target === backdrop) backdrop.remove();
    });

    const sheet = document.createElement('div');
    sheet.className = 'sheet';

    const heading = document.createElement('h2');
    heading.textContent = '어느 폴더로 옮길까요?';
    const sub = document.createElement('p');
    sub.className = 'sheet-sub';
    sub.textContent = song.title;
    sheet.appendChild(heading);
    sheet.appendChild(sub);

    others.forEach(folder => {
      const option = document.createElement('button');
      option.className = 'sheet-option';
      option.textContent = `📁 ${folder.name} (${folder.songs.length}곡)`;
      option.addEventListener('click', () => {
        const from = activeFolder();
        const idx = from.songs.indexOf(song);
        if (idx > -1) from.songs.splice(idx, 1);
        folder.songs.push(song);
        saveData();
        backdrop.remove();
        render();
      });
      sheet.appendChild(option);
    });

    const cancel = document.createElement('button');
    cancel.className = 'sheet-cancel';
    cancel.textContent = '취소';
    cancel.addEventListener('click', () => backdrop.remove());
    sheet.appendChild(cancel);

    backdrop.appendChild(sheet);
    document.body.appendChild(backdrop);
  }

  // 플레이어 자체 컨트롤과 목록 표시 동기화 (mp3 곡일 때만)
  function currentIsAudio() {
    return current && !current.isYt && !current.isVideo;
  }
  function currentIsVideo() {
    return current && current.isVideo;
  }
  audio.addEventListener('pause', () => {
    if (currentIsAudio() && currentLi) currentLi.classList.remove('playing');
  });
  audio.addEventListener('play', () => {
    if (currentIsAudio() && currentLi) currentLi.classList.add('playing');
  });
  audio.addEventListener('ended', () => {
    if (currentIsAudio() && currentLi) currentLi.classList.remove('playing');
  });
  video.addEventListener('pause', () => {
    if (currentIsVideo() && currentLi) currentLi.classList.remove('playing');
  });
  video.addEventListener('play', () => {
    if (currentIsVideo() && currentLi) currentLi.classList.add('playing');
  });
  video.addEventListener('ended', () => {
    if (currentIsVideo() && currentLi) currentLi.classList.remove('playing');
  });

  // 내 파일에서 고르기
  fileBtn.addEventListener('click', () => fileInput.click());
  fileInput.addEventListener('change', async () => {
    const file = fileInput.files[0];
    if (!file) return;

    // 제목을 입력해 뒀으면 그 제목, 아니면 파일 이름 사용
    const title = titleInput.value.trim() || file.name.replace(/\.[^.]+$/, '');
    const fileId = 'file-' + Date.now();
    const isVideo = file.type.startsWith('video/') || /\.(mp4|mov|webm)$/i.test(file.name);

    try {
      await idbPut(fileId, file);
    } catch {
      alert('파일을 저장하지 못했어요.\n휴대폰 저장 공간이 부족할 수 있어요.');
      fileInput.value = '';
      return;
    }

    activeFolder().songs.push({ title, fileId, isVideo });
    saveData();
    render();
    titleInput.value = '';
    fileInput.value = '';
  });

  addBtn.addEventListener('click', addSong);
  urlInput.addEventListener('keydown', e => { if (e.key === 'Enter') addSong(); });
  titleInput.addEventListener('keydown', e => { if (e.key === 'Enter') addSong(); });

  render();
</script>
</body>
</html>
